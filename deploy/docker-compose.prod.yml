services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: komi
      POSTGRES_USER: komi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - komi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U komi -d komi"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://komi:${POSTGRES_PASSWORD}@db:5432/komi
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  komi_pg_data:
